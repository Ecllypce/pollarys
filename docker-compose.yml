services:
  pollarys:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pollarys
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/pollarys:/home/pollarys/.config/pollarys
      - ./data/opencode/share:/home/pollarys/.local/share/opencode
      - ./data/opencode/state:/home/pollarys/.local/state/opencode
      - ./data/opencode/config:/home/pollarys/.config/opencode
      - ./data/ssh:/home/pollarys/.ssh
      - ./workspaces:/home/pollarys/workspaces
    #environment:
    # POLLARYS_HOST: 0.0.0.0  # Bind address (default in Docker: 0.0.0.0)
    # UI_PASSWORD: your_secure_password_here  # Uncomment to set UI password
    # POLLARYS_TUNNEL_PROVIDER: cloudflare
    # POLLARYS_TUNNEL_MODE: quick  # quick | managed-remote | managed-local
    # POLLARYS_TUNNEL_HOSTNAME: app.example.com  # required for managed-remote
    # POLLARYS_TUNNEL_TOKEN: your_cloudflare_token  # required for managed-remote
    # POLLARYS_TUNNEL_CONFIG: /home/pollarys/.cloudflared/config.yml  # optional for managed-local
    # OH_MY_OPENCODE: true # enable oh-my-opencode
    # OPENCODE_HOST: http://172.17.0.1:4096 # Connect to external OpenCode server
    # OPENCODE_SKIP_START: true # skip start opencode
    # POLLARYS_OPENCODE_HOSTNAME: 0.0.0.0 # Bind OpenCode to all interfaces
    restart: unless-stopped


